<!DOCTYPE html>
<html>
  <head>
    <style>
      .container {
        width: 500px;
        height: 500px;
        overflow: hidden;
        border: 1px solid #ddd;
        box-sizing: border-box;
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        margin: auto; 
      }
      
    </style>
  </head>
  <body>
    <div class="container">
      <div id="zoomImage">
        <img src="img.png" alt="zoomable image" />
      </div>
    </div>

    <script type="module">
      import ImageZoom from "./src/main.js";

      // 基础使用
      const zoom = new ImageZoom("#zoomImage", {
        minZoom: 1,
        maxZoom: 4,
        doubleClickZoom: true,
      });

      // 方法调用
      zoom.reset(); // 重置缩放
      zoom.destroy(); // 销毁实例
    </script>
  </body>
</html>
