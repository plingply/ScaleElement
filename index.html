<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>缩放示例</title>
    <script src="./elementZoom.min.js"></script>
    <style>
      .container {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }
      
    </style>
  </head>
  <body>
    <div class="container">
      <div id="zoomImage">
        <img src="img.png" alt="zoomable image" />
      </div>
    </div>

    <script>
      // 基础使用
      const zoom = new elementZoom("#zoomImage", {
        minZoom: 1,
        maxZoom: 4,
        doubleClickZoom: true,
      });

      // 方法调用
      zoom.reset(); // 重置缩放
      zoom.destroy(); // 销毁实例
    </script>
  </body>
</html>
